<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chrome Offline Runner</title>
<style>
  html, body {
    margin: 0; padding: 0; overflow: hidden;
    background: #f7f7f7; font-family: system-ui, sans-serif;
  }
  canvas {
    display: block; margin: 0 auto; background: #fff;
    image-rendering: pixelated;
  }
  #overlay {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; text-align: center;
    background: #f7f7f7; color: #535353;
  }
  #overlay h1 { font-size: 48px; margin: 0; }
  #overlay p { font-size: 16px; margin: 8px 0 0; }
  .hide { display: none !important; }
</style>
</head>
<body>
<div id="overlay">
  <h1>☠️ No Internet ☠️</h1>
  <p>Press SPACE or UP to Start<br>DOWN to Duck | R to Restart</p>
</div>
<canvas id="game" width="900" height="300"></canvas>
