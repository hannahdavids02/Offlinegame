<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Offline Runner</title>
<style>
  html, body {
    margin: 0; padding: 0; overflow: hidden; height: 100%;
    background: #f7f7f7; font-family: system-ui, sans-serif;
    touch-action: none; /* stops page scroll on tap */
  }
  canvas {
    display: block; margin: 0 auto; background: #fff;
    image-rendering: pixelated;
  }
  #overlay {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; text-align: center;
    background: #f7f7f7; color: #535353; z-index: 10;
  }
  #overlay h1 { font-size: 40px; margin: 0; }
  #overlay p { font-size: 14px; margin: 8px 0 0; }
  #btns {
    position: absolute; bottom: 20px; left: 0; right: 0;
    display: flex; justify-content: space-between; padding: 0 20px; z-index: 5;
  }
  .btn {
    width: 80px; height: 80px; border-radius: 50%;
    background: #53535320; border: 2px solid #535353;
    color: #535353; font-size: 14px; font-weight: bold;
    display: flex; align-items: center; justify-content: center;
    user-select: none;
  }
  .hide { display: none !important; }
</style>
</head>
<body>
<div id="overlay">
  <h1>☠️ No Internet ☠️</h1>
  <p>Tap SCREEN to Start<br>TAP TOP = Jump | HOLD BOTTOM = Duck<br>R to Restart on PC</p>
</div>
<canvas id="game"></canvas>

<div id="btns" class="hide">
  <div class="btn" id="duckBtn">DUCK</div>
  <div class="btn" id="jumpBtn">JUMP</div>
</div>
